name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@cross
        if: matrix.cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p vyn-cli --release --target ${{ matrix.target }}
          else
            cargo build -p vyn-cli --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          TARGET=${{ matrix.target }}
          BIN_DIR=target/$TARGET/release
          if [[ "$TARGET" == *windows* ]]; then
            7z a vyn-$TARGET.zip $BIN_DIR/vyn.exe
          else
            tar czf vyn-$TARGET.tar.gz -C $BIN_DIR vyn
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: vyn-${{ matrix.target }}
          path: vyn-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            vyn-*
            scripts/install.sh
          generate_release_notes: true
