services:
  vyn-relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: vyn-relay:latest
    container_name: vyn-relay
    restart: unless-stopped
    environment:
      VYN_RELAY_PORT: ${VYN_RELAY_PORT:-50051}
      VYN_RELAY_DATA_DIR: /data
      VYN_RELAY_S3_BUCKET: ${VYN_RELAY_S3_BUCKET:-}
      VYN_RELAY_S3_REGION: ${VYN_RELAY_S3_REGION:-}
      VYN_RELAY_S3_ENDPOINT: ${VYN_RELAY_S3_ENDPOINT:-}
      VYN_RELAY_S3_PREFIX: ${VYN_RELAY_S3_PREFIX:-}
    ports:
      - "${VYN_RELAY_PORT:-50051}:${VYN_RELAY_PORT:-50051}"
    volumes:
      - vyn-relay-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${VYN_RELAY_PORT:-50051} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vyn-relay-data:
